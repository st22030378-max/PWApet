<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetCare PWA</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=1.1">
</head>

<body>

<header>
  <h1>🐾 PetCare</h1>
  <p>Asistente de cuidado de mascotas</p>
</header>

<main>
  <section class="cards">

    <div class="card">
      <h2>🐶 Perros</h2>
      <p>Consejos de cuidado, alimentación y ejercicio.</p>
    </div>

    <div class="card">
      <h2>🐱 Gatos</h2>
      <p>Todo sobre higiene, comida y salud.</p>
    </div>

    <div class="card">
      <h2>🦜 Aves</h2>
      <p>Cuidados básicos para aves domésticas.</p>
    </div>

    <div class="card">
      <h2>🐟 Peces</h2>
      <p>Cómo mantener un acuario saludable.</p>
    </div>

    <a href="https://buy.stripe.com/test_8x2cN6cod6DueTj3Gr77O00">
      <button>Tarjeta</button>
    </a>

  </section>
</main>

<main>
  <section class="chat">

    <div id="messages" class="messages"></div>

    <div class="input-area">
      <input id="userInput" type="text" placeholder="Pregunta sobre tu mascota..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>

  </section>
</main>

<!-- SOLO frontend -->
<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
